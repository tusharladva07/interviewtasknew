<app-login *ngIf="!isAuthenticated" (loginSuccess)="onLoginSuccess()"></app-login>

<div *ngIf="isAuthenticated" class="app-shell">
  <div class="d-flex justify-content-end mb-3">
    <button type="button" class="btn btn-outline-secondary btn-sm" (click)="logout()">
      Logout
    </button>
  </div>

  <app-user-form
    [editInputData]="editData"
    (isDataUpdated)="onDataUpdated()"
    (editCleared)="editData = null">
  </app-user-form>

  <app-user-list (editData)="onEditData($event)"></app-user-list>
</div>
