<div class="container mt-5">

  <div class="card p-4">

    <h3>Login</h3>

    <form [formGroup]="loginForm">

      <div class="mb-3">
        <label>Email</label>

        <input
          type="email"
          class="form-control"
          formControlName="email">
      </div>

      <div class="mb-3">
        <label>Password</label>

        <input
          type="password"
          class="form-control"
          formControlName="password">
      </div>

      <button
        class="btn btn-primary"
        (click)="login()">
        Login
      </button>

    </form>

  </div>

</div>
